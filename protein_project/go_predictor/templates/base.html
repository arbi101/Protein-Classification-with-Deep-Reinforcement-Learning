<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Protein GO Predictor{% endblock %}</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.js"></script>
    {% load static %}
    <link rel="stylesheet" href="{% static 'go_predictor/css/styles.css' %}">
    <style>
        body {
            background: linear-gradient(to bottom right, #f8fafc, #e0f2fe);
            min-height: 100vh;
        }
    </style>
</head>
<body class="min-h-screen">
    {% block content %}{% endblock %}

    <footer class="text-center mt-5 mb-3 text-slate-500 text-sm">
        &copy; {{ year }} Protein Classification Project
    </footer>

    <script>
        lucide.createIcons();
    </script>
</body>
</html>
